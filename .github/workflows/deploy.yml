name: Deploy to ECS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 24.18.0
  IMAGE_NAME: team-account-manager

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.sha }}
      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint
      - name: Run tests
        env:
          CI: "true"
        run: npm test
      - name: Validate migrations
        run: mkdir -p data && npm run db:migrate
      - name: Build application
        run: npm run build
      - name: Validate deployment image
        if: github.event_name == 'pull_request'
        run: docker build .

  deploy:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Deploy production
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: production
    concurrency:
      group: production-ecs-deploy
      cancel-in-progress: false
    env:
      ECS_HOST: 8.153.38.90
      ECS_PORT: "22"
      ECS_PATH: /data/team-account-manager
    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.sha }}
      - name: Configure SSH
        env:
          ECS_SSH_USER: ${{ secrets.ECS_SSH_USER }}
          ECS_SSH_PRIVATE_KEY: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
          ECS_SSH_KNOWN_HOSTS: ${{ secrets.ECS_SSH_KNOWN_HOSTS }}
        run: |
          test -n "$ECS_SSH_USER"
          test -n "$ECS_SSH_PRIVATE_KEY"
          test -n "$ECS_SSH_KNOWN_HOSTS"
          umask 077
          install -d -m 700 "$RUNNER_TEMP/ssh"
          printf '%s\n' "$ECS_SSH_PRIVATE_KEY" > "$RUNNER_TEMP/ssh/id_ed25519"
          printf '%s\n' "$ECS_SSH_KNOWN_HOSTS" > "$RUNNER_TEMP/ssh/known_hosts"
          cat > "$RUNNER_TEMP/ssh/config" <<EOF
          Host ecs-deploy
            HostName $ECS_HOST
            Port $ECS_PORT
            User $ECS_SSH_USER
            IdentityFile $RUNNER_TEMP/ssh/id_ed25519
            IdentitiesOnly yes
            BatchMode yes
            StrictHostKeyChecking yes
            UserKnownHostsFile $RUNNER_TEMP/ssh/known_hosts
            GlobalKnownHostsFile /dev/null
            ConnectTimeout 15
            ServerAliveInterval 15
            ServerAliveCountMax 3
            LogLevel ERROR
          EOF
          chmod 600 "$RUNNER_TEMP/ssh/id_ed25519" "$RUNNER_TEMP/ssh/known_hosts" "$RUNNER_TEMP/ssh/config"
      - name: Validate deployment host
        run: |
          ssh -F "$RUNNER_TEMP/ssh/config" ecs-deploy 'bash -se' <<'REMOTE'
          set -Eeuo pipefail
          ECS_PATH=/data/team-account-manager

          command -v docker
          docker info >/dev/null
          docker compose version
          command -v gzip
          command -v rsync
          test -d "$ECS_PATH" && test ! -L "$ECS_PATH"
          test -f "$ECS_PATH/.env.production" && test ! -L "$ECS_PATH/.env.production"
          case "$(stat -c '%a' "$ECS_PATH/.env.production")" in
            400|600) ;;
            *) echo "Unsafe .env.production permissions" >&2; exit 1 ;;
          esac
          test "$(stat -c '%U' "$ECS_PATH/.env.production")" = "$(id -un)"
          mkdir -p "$ECS_PATH/data"
          test -d "$ECS_PATH/data" && test ! -L "$ECS_PATH/data"
          test "$(stat -c '%U' "$ECS_PATH/data")" = "$(id -un)"
          REMOTE
      - name: Build deployment image
        run: docker build --tag "$IMAGE_NAME:${{ github.sha }}" .
      - name: Synchronize deployment config
        run: |
          rsync -az --timeout=120 --no-owner --no-group -e "ssh -F $RUNNER_TEMP/ssh/config" ./compose.yaml ecs-deploy:"$ECS_PATH/compose.yaml"
      - name: Transfer deployment image
        run: |
          set -o pipefail
          docker save "$IMAGE_NAME:${{ github.sha }}" \
            | gzip -1 \
            | ssh -F "$RUNNER_TEMP/ssh/config" ecs-deploy 'gzip -dc | docker load'
      - name: Start deployment image
        run: |
          ssh -F "$RUNNER_TEMP/ssh/config" ecs-deploy "bash -se -- '${{ github.sha }}' '$IMAGE_NAME:${{ github.sha }}'" <<'REMOTE'
          set -Eeuo pipefail
          revision="$1"
          image="$2"
          ECS_PATH=/data/team-account-manager
          cd "$ECS_PATH"
          export APP_IMAGE="$image"
          trap 'docker compose ps >&2' ERR

          docker compose --env-file .env.production config --quiet
          previous_container_id="$(docker compose ps --all -q app || true)"
          previous_image="$(docker inspect -f '{{.Config.Image}}' "$previous_container_id" 2>/dev/null || true)"
          docker compose up -d --no-build --wait --wait-timeout 60 --remove-orphans
          container_id="$(docker compose ps -q app)"
          test -n "$container_id"
          test "$(docker inspect -f '{{.State.Health.Status}}' "$container_id")" = healthy
          docker compose exec -T app node -e "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
          printf '%s\n' "$revision" > "$ECS_PATH/DEPLOYED_REVISION"
          case "$previous_image" in
            team-account-manager:*) test "$previous_image" = "$image" || docker image rm "$previous_image" || true ;;
          esac
          REMOTE
      - name: Verify public health endpoint
        run: |
          curl --fail --silent --show-error --retry 5 --retry-delay 3 --retry-all-errors --connect-timeout 15 "http://$ECS_HOST:3000/api/health"
