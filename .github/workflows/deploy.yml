name: Deploy to ECS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: 24.18.0
  IMAGE_NAME: ghcr.io/userchenentao5/team-account-manager

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.sha }}
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint
      - name: Run tests
        env:
          CI: "true"
        run: npm test
      - name: Validate migrations
        run: mkdir -p data && npm run db:migrate
      - name: Build application
        run: npm run build

  build-image:
    name: Build and publish image
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      image: ${{ steps.publish.outputs.image }}
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.sha }}
      - name: Authenticate to GHCR
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin
      - name: Build and publish immutable image
        id: publish
        run: |
          image="$IMAGE_NAME:$GITHUB_SHA"
          docker build --build-arg VCS_REF="$GITHUB_SHA" --tag "$image" .
          docker push "$image"
          digest="$(docker image inspect "$image" --format '{{index .RepoDigests 0}}')"
          test -n "$digest"
          echo "image=$digest" >> "$GITHUB_OUTPUT"

  deploy:
    needs: [verify, build-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Deploy production
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: production
    concurrency:
      group: production-ecs-deploy
      cancel-in-progress: false
    env:
      ECS_HOST: 8.153.38.90
      ECS_PORT: "22"
      ECS_PATH: /data/team-account-manager
      GHCR_USERNAME: Userchenentao5
      GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.sha }}
      - name: Configure SSH
        env:
          ECS_SSH_USER: ${{ secrets.ECS_SSH_USER }}
          ECS_SSH_PRIVATE_KEY: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
          ECS_SSH_KNOWN_HOSTS: ${{ secrets.ECS_SSH_KNOWN_HOSTS }}
        run: |
          test -n "$ECS_SSH_USER"
          test -n "$ECS_SSH_PRIVATE_KEY"
          test -n "$ECS_SSH_KNOWN_HOSTS"
          umask 077
          install -d -m 700 "$RUNNER_TEMP/ssh"
          printf '%s\n' "$ECS_SSH_PRIVATE_KEY" > "$RUNNER_TEMP/ssh/id_ed25519"
          printf '%s\n' "$ECS_SSH_KNOWN_HOSTS" > "$RUNNER_TEMP/ssh/known_hosts"
          cat > "$RUNNER_TEMP/ssh/config" <<EOF
          Host ecs-deploy
            HostName $ECS_HOST
            Port $ECS_PORT
            User $ECS_SSH_USER
            IdentityFile $RUNNER_TEMP/ssh/id_ed25519
            IdentitiesOnly yes
            BatchMode yes
            StrictHostKeyChecking yes
            UserKnownHostsFile $RUNNER_TEMP/ssh/known_hosts
            GlobalKnownHostsFile /dev/null
            ConnectTimeout 15
            ServerAliveInterval 15
            ServerAliveCountMax 3
            LogLevel ERROR
          EOF
          chmod 600 "$RUNNER_TEMP/ssh/id_ed25519" "$RUNNER_TEMP/ssh/known_hosts" "$RUNNER_TEMP/ssh/config"
      - name: Validate deployment host
        run: |
          ssh -F "$RUNNER_TEMP/ssh/config" ecs-deploy 'bash -se' <<'REMOTE'
          set -Eeuo pipefail
          ECS_PATH=/data/team-account-manager
          command -v docker
          docker compose version
          test -d "$ECS_PATH" && test ! -L "$ECS_PATH"
          test -f "$ECS_PATH/.env.production" && test ! -L "$ECS_PATH/.env.production"
          case "$(stat -c '%a' "$ECS_PATH/.env.production")" in
            400|600) ;;
            *) echo "Unsafe .env.production permissions" >&2; exit 1 ;;
          esac
          test "$(stat -c '%U' "$ECS_PATH/.env.production")" = "$(id -un)"
          mkdir -p "$ECS_PATH/data"
          test -d "$ECS_PATH/data" && test ! -L "$ECS_PATH/data"
          REMOTE
      - name: Stage candidate Compose file
        run: scp -F "$RUNNER_TEMP/ssh/config" ./compose.yaml "ecs-deploy:$ECS_PATH/compose.candidate.yaml"
      - name: Stage temporary registry credential
        run: |
          test -n "$GHCR_READ_TOKEN"
          token_file="$RUNNER_TEMP/ghcr-read-token"
          trap 'rm -f "$token_file"' EXIT
          umask 077
          printf '%s\n' "$GHCR_READ_TOKEN" > "$token_file"
          scp -F "$RUNNER_TEMP/ssh/config" "$token_file" "ecs-deploy:/tmp/team-account-manager-ghcr-$GITHUB_RUN_ID.token"
      - name: Deploy immutable image with rollback
        env:
          APP_IMAGE: ${{ needs.build-image.outputs.image }}
        run: |
          ssh -F "$RUNNER_TEMP/ssh/config" ecs-deploy "ECS_PATH='$ECS_PATH' APP_IMAGE='$APP_IMAGE' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN_FILE='/tmp/team-account-manager-ghcr-$GITHUB_RUN_ID.token' bash -se" < scripts/deploy-production.sh
      - name: Verify public health endpoint
        run: curl --fail --silent --show-error --retry 5 --retry-delay 3 --retry-all-errors --connect-timeout 15 "http://$ECS_HOST:3000/api/health"
