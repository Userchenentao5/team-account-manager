services:
  app:
    build:
      context: ${APP_CONTEXT:-.}
    restart: unless-stopped
    env_file: .env.production
    environment:
      DB_FILE_NAME: /app/data/app.db
    volumes:
      - ./data:/app/data
    ports:
      - "3000:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/login').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
